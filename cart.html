<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

       
        #remove-sheet {
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            transform: translateY(100%);
        }
        #remove-sheet.open { transform: translateY(0); }

        #sheet-overlay {
            transition: opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        #sheet-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .cart-card {
            animation: fadeUp 0.18s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 pb-36">

    
    <header class="px-5 pt-6 pb-4 flex items-center justify-between bg-gray-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
                <i class="fa-solid fa-bolt text-white text-sm"></i>
            </div>
            <h1 class="text-xl font-extrabold text-gray-900">My Cart</h1>
        </div>
        <a href="search.html" class="w-10 h-10 flex items-center justify-center">
            <i class="fa-solid fa-magnifying-glass text-xl text-gray-800"></i>
        </a>
    </header>

   
    <main class="px-5 pt-2" id="cart-list"></main>

    
    <div id="empty-state" class="hidden flex-col items-center justify-center py-32 px-6 text-center">
        <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-5 shadow-sm">
            <i class="fa-solid fa-bag-shopping text-3xl text-gray-300"></i>
        </div>
        <h2 class="text-lg font-extrabold text-gray-900 mb-2">Your cart is empty</h2>
        <p class="text-sm text-gray-400 mb-6">Go explore some awesome shoes!</p>
        <a href="index.html" class="bg-gray-900 text-white px-8 py-3 rounded-full font-bold text-sm">
            Browse Products
        </a>
    </div>

    
    <div id="checkout-bar"
         class="fixed bottom-0 left-0 right-0 bg-white px-5 pt-4 pb-6 z-40">
        <div class="flex items-end justify-between">
            <div>
                <p class="text-xs text-gray-400 mb-0.5">Total price</p>
                <p id="total-price" class="text-2xl font-extrabold text-gray-900">$0.00</p>
            </div>
            <button onclick="checkout()"
                    class="flex items-center gap-2 bg-gray-900 text-white pl-8 pr-6 py-4 rounded-full font-bold text-base active:scale-95 transition-transform">
                Checkout
                <i class="fa-solid fa-arrow-right text-sm"></i>
            </button>
        </div>
    </div>

   
    <div id="sheet-overlay"
         class="fixed inset-0 bg-black/40 z-50"
         onclick="closeSheet()">
    </div>

    
    <div id="remove-sheet"
         class="fixed bottom-0 left-0 right-0 bg-white rounded-t-3xl z-50 px-6 pt-4 pb-8">

        
        <div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-6"></div>

        <h2 class="text-xl font-extrabold text-gray-900 text-center mb-6">Remove From Cart?</h2>

        
        <div id="sheet-preview"
             class="flex items-center gap-4 bg-gray-50 rounded-3xl p-4 mb-6">
            
        </div>

        
        <div class="flex gap-3">
            <button onclick="closeSheet()"
                    class="flex-1 py-4 bg-gray-100 rounded-full font-bold text-gray-800 text-sm active:scale-95 transition-transform">
                Cancel
            </button>
            <button onclick="confirmRemove()"
                    class="flex-1 py-4 bg-gray-900 text-white rounded-full font-bold text-sm active:scale-95 transition-transform">
                Yes, Remove
            </button>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let pendingRemoveIndex = null;

        
        function renderCart() {
            const items    = Cart.getItems();
            const listEl   = document.getElementById('cart-list');
            const emptyEl  = document.getElementById('empty-state');
            const barEl    = document.getElementById('checkout-bar');

            listEl.innerHTML = '';

            if (items.length === 0) {
                emptyEl.classList.remove('hidden');
                emptyEl.classList.add('flex');
                barEl.classList.add('hidden');
                return;
            }

            emptyEl.classList.add('hidden');
            emptyEl.classList.remove('flex');
            barEl.classList.remove('hidden');

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'cart-card bg-white rounded-3xl p-4 mb-4 flex items-center gap-4';
                card.id = `cart-item-${index}`;
                card.innerHTML = `
                    <!-- عکس -->
                    <div class="w-28 h-28 bg-gray-100 rounded-2xl flex items-center justify-center flex-shrink-0">
                        <img src="${item.image}" alt="${item.name}" class="w-full h-full object-contain p-2">
                    </div>

                    <!-- اطلاعات -->
                    <div class="flex-1 min-w-0">
                        <div class="flex items-start justify-between mb-1">
                            <h3 class="font-bold text-gray-900 text-[15px] leading-tight truncate pr-2">${item.name}</h3>
                            <button onclick="openSheet(${index})"
                                    class="flex-shrink-0 text-gray-400 hover:text-gray-600 mt-0.5">
                                <i class="fa-regular fa-trash-can text-base"></i>
                            </button>
                        </div>

                        <!-- رنگ و سایز -->
                        <div class="flex items-center gap-2 mb-3">
                            <span class="w-3.5 h-3.5 rounded-full border border-gray-200 flex-shrink-0"
                                  style="background-color:${item.color}"></span>
                            <span class="text-xs text-gray-400 font-medium">
                                Size = ${item.size}
                            </span>
                        </div>

                        <!-- قیمت + تعداد -->
                        <div class="flex items-center justify-between">
                            <span class="font-extrabold text-gray-900 text-base">
                                $${(item.price * item.quantity).toFixed(2)}
                            </span>
                            <div class="flex items-center gap-3 bg-gray-100 rounded-full px-4 py-1.5">
                                <button onclick="updateQty(${index}, ${item.quantity - 1})"
                                        class="text-gray-700 font-bold text-base w-4 text-center leading-none select-none">−</button>
                                <span class="text-sm font-bold w-4 text-center">${item.quantity}</span>
                                <button onclick="updateQty(${index}, ${item.quantity + 1})"
                                        class="text-gray-700 font-bold text-base w-4 text-center leading-none select-none">+</button>
                            </div>
                        </div>
                    </div>
                `;
                listEl.appendChild(card);
            });

            document.getElementById('total-price').innerText =
                `$${Cart.getTotalPrice().toFixed(2)}`;
        }

       
        function updateQty(index, newQty) {
            Cart.updateQuantity(index, newQty);
            renderCart();
        }

        function openSheet(index) {
            pendingRemoveIndex = index;
            const item = Cart.getItems()[index];

            document.getElementById('sheet-preview').innerHTML = `
                <div class="w-20 h-20 bg-white rounded-2xl flex items-center justify-center flex-shrink-0">
                    <img src="${item.image}" alt="${item.name}" class="w-full h-full object-contain p-1">
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="font-bold text-gray-900 text-sm truncate mb-1">${item.name}</h3>
                    <div class="flex items-center gap-2 mb-2">
                        <span class="w-3 h-3 rounded-full border border-gray-200"
                              style="background-color:${item.color}"></span>
                        <span class="text-xs text-gray-400">Size = ${item.size}</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="font-extrabold text-gray-900 text-sm">$${(item.price * item.quantity).toFixed(2)}</span>
                        <div class="flex items-center gap-3 bg-white rounded-full px-4 py-1.5 border border-gray-100">
                            <span class="text-gray-400 text-sm">−</span>
                            <span class="text-sm font-bold">${item.quantity}</span>
                            <span class="text-gray-400 text-sm">+</span>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('remove-sheet').classList.add('open');
            document.getElementById('sheet-overlay').classList.add('open');
        }

        function closeSheet() {
            document.getElementById('remove-sheet').classList.remove('open');
            document.getElementById('sheet-overlay').classList.remove('open');
            pendingRemoveIndex = null;
        }

        function confirmRemove() {
            if (pendingRemoveIndex === null) return;
            Cart.removeItem(pendingRemoveIndex);
            closeSheet();
            renderCart();
        }

       
        function checkout() {
            const items = Cart.getItems();
            if (items.length === 0) return;
            window.location.href = 'checkout.html';
        }

        renderCart();
    </script>

</body>
</html>
